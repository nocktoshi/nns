# Fast test suite on every push and pull request.
# Prover-heavy tests live in prover-weekly.yml (ignored by default).
name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  TRACY_NO_INVARIANT_CHECK: "1"
  NNS_KERNEL_JAM: ${{ github.workspace }}/nns/nns.jam

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: nns

    steps:
      - name: Checkout nns
        uses: actions/checkout@v4
        with:
          path: nns

      - name: Checkout nockchain
        uses: actions/checkout@v4
        with:
          repository: nocktoshi/nockchain
          ref: ea5f831635f32acdd55e9ea60890e012dcd1b13f
          path: nockchain

      - name: Checkout vesl-core
        uses: actions/checkout@v4
        with:
          repository: nocktoshi/vesl-core
          ref: dc9382cd2110cb39561bf4abdc47d7d7f88029b5
          path: vesl-core

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: nns
          cache-on-failure: true

      - name: Install hoonc and nockup
        run: |
          cargo +nightly install --path ../nockchain/crates/hoonc --locked
          cargo +nightly install --path ../nockchain/crates/nockup --locked

      - name: Build kernel jam
        run: make install-kernel DESTDIR=$HOME/.local

      - name: Hoon compile-time tests
        run: hoonc --new --arbitrary hoon/tests/names.hoon hoon/

      - name: Rust tests (fast)
        run: cargo +nightly test
