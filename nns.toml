# NNS configuration.
# Environment variables override these; CLI flags override everything.
#
#
# Hull HTTP API port (default: 3000)
# api_port = 3000

# --- Settlement mode ---
# v1 runs in local: kernel verifies, no chain interaction.
# Flip to "fakenet" or "dumbnet" to enable chain posting (requires chain_endpoint + key).
settlement_mode = "dumbnet"

# --- Chain settings (fakenet/dumbnet only) ---
chain_endpoint = "https://rpc.nockchain.net"
# tx_fee = 256
# accept_timeout_secs = 300

# --- Test / dev tracing (optional) ---
[tracing_env]
tracy_no_invariant_check = "1"
minimal_log_format = "1"
rust_log = "info,nockapp::kernel::form=warn,nockapp::utils::durability=warn,nockapp::snapshot=warn,nockapp::kernel::boot=warn"
